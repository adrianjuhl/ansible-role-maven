---
# tasks file for adrianjuhl.maven

- name: Create download directory
  file:
    dest: "{{ adrianjuhl__maven__maven_download_directory }}"
    state: directory
    mode: "u=rwx,go=rx"

- name: Download Maven
  get_url:
    url: "{{ adrianjuhl__maven__maven_source_directory }}/{{ adrianjuhl__maven__maven_filename }}"
    dest: "{{ adrianjuhl__maven__maven_download_directory }}/{{ adrianjuhl__maven__maven_filename }}"
    checksum: "{{ adrianjuhl__maven__maven_file_checksum }}"
    force: no
    mode: "u=rw,go=r"

- name: Create maven install directory.
  file:
    dest: "{{ adrianjuhl__maven__maven_install_directory }}"
    state: directory
  become: true

- name: Unarchive maven.
  unarchive:
    src: "{{ adrianjuhl__maven__maven_download_directory }}/{{ adrianjuhl__maven__maven_filename }}"
    dest: "{{ adrianjuhl__maven__maven_install_directory }}"
    copy: false
  become: true

- name: Install maven alternative
  community.general.alternatives:
    name: mvn
    path: "{{ adrianjuhl__maven__maven_install_directory }}/apache-maven-{{ adrianjuhl__maven__maven_version }}/bin/mvn"
    link: /usr/bin/mvn
    priority: "{{ adrianjuhl__maven__alternatives_priority }}"
    state: "{{ adrianjuhl__maven__alternatives_state }}"
  become: true

