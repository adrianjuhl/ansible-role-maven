---
# tasks file for adrianjuhl.maven

- name: Create maven install directory.
  file:
    dest: "{{ adrianjuhl__maven__maven_install_dir }}"
    state: directory
  become: true

- name: Unarchive maven.
  unarchive:
    src: "{{ adrianjuhl__maven__maven_download_file }}"
    dest: "{{ adrianjuhl__maven__maven_install_dir }}"
    copy: false
  become: true

- name: Install maven alternative
  community.general.alternatives:
    name: mvn
    path: "{{ adrianjuhl__maven__maven_install_dir }}/apache-maven-{{ adrianjuhl__maven__maven_version }}/bin/mvn"
    link: /usr/bin/mvn
